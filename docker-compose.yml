services:
  fox-app:
    build: .
    container_name: project-fox
    restart: unless-stopped
    ports:
      - "8501:8501"
    env_file:
      - .env                      # Binance API_KEY / API_SECRET / GEMINI_API_KEY
    environment:
      FOX_DATA_DIR: /data         # 持久化目錄：DB + 沙盒存檔
    volumes:
      - fox-data:/data            # Named volume，容器重啟後數據不遺失
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8501/_stcore/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

volumes:
  fox-data:
    driver: local
